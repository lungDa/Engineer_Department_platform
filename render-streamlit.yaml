services:
  - type: web
    name: engineer-department-platform
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: V5.1.0 LINE Smart Assistant
