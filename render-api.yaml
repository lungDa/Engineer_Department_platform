services:
  - type: web
    name: engineer-department-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_VERSION
        value: V5.6.0 Microsoft 365 Notifications Foundation
      - key: TEAMS_WEBHOOK_URL
        sync: false
      - key: OUTLOOK_WEBHOOK_URL
        sync: false
      - key: M365_WEBHOOK_TOKEN
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
