name: Keep Services Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-services:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Streamlit
        run: |
          curl \
            --silent \
            --show-error \
            --fail \
            --max-time 60 \
            --output /dev/null \
            "https://engineer-department-platform.streamlit.app/"

      - name: Ping Render API
        if: always()
        run: |
          curl \
            --silent \
            --show-error \
            --location \
            --fail \
            --retry 3 \
            --retry-delay 10 \
            --max-time 120 \
            --output /dev/null \
            "https://engineer-department-platform.onrender.com/health"
